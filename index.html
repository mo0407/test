<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SBTI 人格测试 - Cyberpunk Edition</title>
  <style>
    :root {
      --cyber-bg: #0a0e27;
      --cyber-card: #151b3d;
      --cyber-accent: #00ff9f;
      --cyber-accent-2: #ff00ff;
      --cyber-text: #e0e6ff;
      --cyber-muted: #8b92b5;
      --cyber-border: #2a3561;
      --cyber-glow: rgba(0, 255, 159, 0.3);
      --cyber-gradient: linear-gradient(135deg, #0a0e27 0%, #1a1f4e 50%, #0a0e27 100%);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: var(--cyber-bg);
      background-image:
        radial-gradient(circle at 20% 50%, rgba(0, 255, 159, 0.1) 0%, transparent 50%),
        radial-gradient(circle at 80% 50%, rgba(255, 0, 255, 0.1) 0%, transparent 50%);
      color: var(--cyber-text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    .cyber-grid {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image:
        linear-gradient(rgba(0, 255, 159, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 255, 159, 0.03) 1px, transparent 1px);
      background-size: 50px 50px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 20px;
      position: relative;
      z-index: 1;
    }

    .screen {
      display: none;
      animation: fadeIn 0.5s ease;
    }

    .screen.active {
      display: block;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes glowPulse {
      0%, 100% { box-shadow: 0 0 20px var(--cyber-glow); }
      50% { box-shadow: 0 0 40px var(--cyber-glow); }
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(50px); }
      to { opacity: 1; transform: translateX(0); }
    }

    @keyframes slideOut {
      from { opacity: 1; transform: translateX(0); }
      to { opacity: 0; transform: translateX(-50px); }
    }

    .hero {
      text-align: center;
      padding: 60px 20px;
      background: var(--cyber-card);
      border: 2px solid var(--cyber-accent);
      border-radius: 20px;
      margin-bottom: 30px;
      position: relative;
      overflow: hidden;
      animation: glowPulse 3s infinite;
    }

    .hero::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: linear-gradient(45deg, transparent, rgba(0, 255, 159, 0.1), transparent);
      animation: rotate 15s linear infinite;
    }

    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .hero h1 {
      font-size: clamp(32px, 6vw, 56px);
      font-weight: 800;
      background: linear-gradient(135deg, var(--cyber-accent), var(--cyber-accent-2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 20px;
      position: relative;
      z-index: 1;
    }

    .hero p {
      font-size: 18px;
      color: var(--cyber-muted);
      margin-bottom: 30px;
      position: relative;
      z-index: 1;
    }

    .cyber-btn {
      background: linear-gradient(135deg, var(--cyber-accent), #00cc7a);
      color: var(--cyber-bg);
      border: none;
      padding: 16px 40px;
      font-size: 18px;
      font-weight: 700;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      z-index: 1;
      box-shadow: 0 10px 30px rgba(0, 255, 159, 0.3);
    }

    .cyber-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 40px rgba(0, 255, 159, 0.5);
    }

    .cyber-btn:disabled {
      background: var(--cyber-muted);
      cursor: not-allowed;
      transform: none;
    }

    .cyber-btn-secondary {
      background: transparent;
      color: var(--cyber-accent);
      border: 2px solid var(--cyber-accent);
      box-shadow: none;
    }

    .cyber-btn-secondary:hover {
      background: rgba(0, 255, 159, 0.1);
    }

    /* 卡片堆叠样式 */
    .card-container {
      position: relative;
      width: 100%;
      max-width: 700px;
      margin: 40px auto;
      min-height: 500px;
    }

    .question-card {
      position: absolute;
      width: 100%;
      background: var(--cyber-card);
      border: 2px solid var(--cyber-border);
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      opacity: 0;
      transform: translateX(100%) scale(0.9);
      pointer-events: none;
    }

    .question-card.active {
      opacity: 1;
      transform: translateX(0) scale(1);
      pointer-events: all;
      z-index: 10;
    }

    .question-card.prev {
      opacity: 0;
      transform: translateX(-100%) scale(0.9);
      z-index: 5;
    }

    .question-card.next {
      opacity: 0.3;
      transform: translateX(30%) scale(0.95) rotate(-2deg);
      z-index: 1;
    }

    .question-card.next-next {
      opacity: 0.1;
      transform: translateX(60%) scale(0.9) rotate(-4deg);
      z-index: 0;
    }

    .question-number {
      display: inline-block;
      background: linear-gradient(135deg, var(--cyber-accent), var(--cyber-accent-2));
      color: var(--cyber-bg);
      padding: 8px 20px;
      border-radius: 25px;
      font-weight: 700;
      font-size: 14px;
      margin-bottom: 20px;
    }

    .question-text {
      font-size: 22px;
      line-height: 1.6;
      margin-bottom: 30px;
      color: var(--cyber-text);
    }

    .options-grid {
      display: grid;
      gap: 15px;
      margin-bottom: 30px;
    }

    .option-card {
      background: rgba(255, 255, 255, 0.05);
      border: 2px solid var(--cyber-border);
      border-radius: 15px;
      padding: 20px;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .option-card:hover {
      background: rgba(0, 255, 159, 0.1);
      border-color: var(--cyber-accent);
      transform: translateY(-2px);
    }

    .option-card.selected {
      background: rgba(0, 255, 159, 0.2);
      border-color: var(--cyber-accent);
      box-shadow: 0 0 20px rgba(0, 255, 159, 0.3);
    }

    .option-badge {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--cyber-accent), var(--cyber-accent-2));
      color: var(--cyber-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 18px;
      flex-shrink: 0;
    }

    .option-text {
      flex: 1;
      font-size: 16px;
    }

    .card-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 30px;
      padding-top: 20px;
      border-top: 1px solid var(--cyber-border);
    }

    .progress-indicator {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .progress-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--cyber-border);
      transition: all 0.3s ease;
    }

    .progress-dot.active {
      background: var(--cyber-accent);
      box-shadow: 0 0 10px var(--cyber-accent);
    }

    .progress-dot.completed {
      background: var(--cyber-accent);
    }

    /* 结果页面 */
    .result-hero {
      text-align: center;
      padding: 40px;
      background: var(--cyber-card);
      border: 2px solid var(--cyber-accent);
      border-radius: 20px;
      margin-bottom: 30px;
      animation: glowPulse 3s infinite;
    }

    .result-type {
      font-size: 64px;
      font-weight: 900;
      background: linear-gradient(135deg, var(--cyber-accent), var(--cyber-accent-2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 10px;
    }

    .result-name {
      font-size: 32px;
      color: var(--cyber-text);
      margin-bottom: 20px;
    }

    .result-badge {
      display: inline-block;
      background: rgba(0, 255, 159, 0.2);
      border: 1px solid var(--cyber-accent);
      color: var(--cyber-accent);
      padding: 10px 25px;
      border-radius: 25px;
      font-weight: 700;
      margin-bottom: 30px;
    }

    .result-image-container {
      text-align: center;
      margin: 30px 0;
    }

    .result-image {
      max-width: 100%;
      height: auto;
      border-radius: 20px;
      border: 3px solid var(--cyber-accent);
      box-shadow: 0 20px 60px rgba(0, 255, 159, 0.3);
    }

    .result-desc {
      background: var(--cyber-card);
      border: 1px solid var(--cyber-border);
      border-radius: 15px;
      padding: 30px;
      line-height: 1.8;
      color: var(--cyber-text);
      margin-bottom: 30px;
    }

    .dimension-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .dimension-card {
      background: var(--cyber-card);
      border: 1px solid var(--cyber-border);
      border-radius: 15px;
      padding: 20px;
    }

    .dimension-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }

    .dimension-name {
      font-weight: 700;
      color: var(--cyber-accent);
    }

    .dimension-score {
      background: linear-gradient(135deg, var(--cyber-accent), var(--cyber-accent-2));
      color: var(--cyber-bg);
      padding: 5px 15px;
      border-radius: 15px;
      font-weight: 800;
      font-size: 14px;
    }

    .dimension-desc {
      color: var(--cyber-muted);
      font-size: 14px;
      line-height: 1.6;
    }

    .action-buttons {
      display: flex;
      gap: 15px;
      justify-content: center;
      flex-wrap: wrap;
    }

    @media (max-width: 768px) {
      .container {
        padding: 20px 15px;
      }

      .hero {
        padding: 40px 20px;
      }

      .question-card {
        padding: 25px;
        min-height: 450px;
      }

      .question-text {
        font-size: 18px;
      }

      .result-type {
        font-size: 48px;
      }

      .result-name {
        font-size: 24px;
      }

      .dimension-grid {
        grid-template-columns: 1fr;
      }
    }

    .cyber-footer {
      text-align: center;
      padding: 30px;
      color: var(--cyber-muted);
      font-size: 14px;
      border-top: 1px solid var(--cyber-border);
      margin-top: 50px;
    }

    .cyber-footer a {
      color: var(--cyber-accent);
      text-decoration: none;
    }

    .cyber-footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="cyber-grid"></div>

  <div class="container">
    <!-- 首页 -->
    <section id="intro-screen" class="screen active">
      <div class="hero">
        <h1>⚡ SBTI 人格测试</h1>
        <p>赛博朋克版 · 30题精准分析 · 27种人格类型</p>
        <button class="cyber-btn" onclick="startQuiz()">开始测试</button>
      </div>

      <div class="cyber-footer">
        <p>原作者：<a href="https://www.bilibili.com/video/BV1LpDHByET6/" target="_blank">B站@Q肉儿串儿</a></p>
        <p style="margin-top: 10px; font-size: 12px;">本镜像已获得原作者授权 · 仅供娱乐</p>
      </div>
    </section>

    <!-- 答题页面 -->
    <section id="quiz-screen" class="screen">
      <div class="card-container" id="card-container">
        <!-- 问题卡片将通过JS动态生成 -->
      </div>

      <div class="progress-indicator" id="progress-indicator">
        <!-- 进度点将通过JS动态生成 -->
      </div>
    </section>

    <!-- 结果页面 -->
    <section id="result-screen" class="screen">
      <div class="result-hero">
        <div class="result-type" id="result-type">IMSB</div>
        <div class="result-name" id="result-name">傻者</div>
        <div class="result-badge" id="result-badge">匹配度 92%</div>
      </div>

      <div class="result-image-container">
        <img id="result-image" class="result-image" src="" alt="人格结果">
      </div>

      <div class="result-desc" id="result-desc">
        描述文本将在这里显示...
      </div>

      <div class="dimension-grid" id="dimension-grid">
        <!-- 维度卡片将通过JS动态生成 -->
      </div>

      <div class="action-buttons">
        <button class="cyber-btn cyber-btn-secondary" onclick="restartQuiz()">重新测试</button>
        <button class="cyber-btn" onclick="backToIntro()">返回首页</button>
      </div>

      <div class="cyber-footer">
        <p>⚠️ 本测试仅供娱乐，请勿作为心理或医学诊断依据</p>
      </div>
    </section>
  </div>

  <script>
    // 数据定义（使用模板字面量避免中文引号问题）
    const QUESTIONS = [
      { id: 'q1', dim: 'S1', text: `我不仅是屌丝，我还是joker,我还是咸鱼，这辈子没谈过一场恋爱，胆怯又自卑，我的青春就是一场又一场的意淫，每一天幻想着我也能有一个女孩子和我一起压马路，一起逛街，一起玩，现实却是爆了父母金币，读了个烂学校，混日子之后找班上，没有理想，没有目标，没有能力的三无人员，每次看到你能在网上开屌丝的玩笑，我都想哭，我就是地底下的老鼠，透过下水井的缝隙，窥探地上的各种美好，每一次看到这种都是对我心灵的一次伤害，对我生存空间的一次压缩，求求哥们给我们这种小丑一点活路吧，我真的不想在白天把枕巾哭湿一大片`, options: [`我哭了。。`, `这是什么。。`, `这不是我！`] },
      { id: 'q2', dim: 'S1', text: `我不够好，周围的人都比我优秀`, options: [`确实`, `有时`, `不是`] },
      { id: 'q3', dim: 'S2', text: `我很清楚真正的自己是什么样的`, options: [`不认同`, `中立`, `认同`] },
      { id: 'q4', dim: 'S2', text: `我内心有真正追求的东西`, options: [`不认同`, `中立`, `认同`] },
      { id: 'q5', dim: 'S3', text: `我一定要不断往上爬、变得更厉害`, options: [`不认同`, `中立`, `认同`] },
      { id: 'q6', dim: 'S3', text: `外人的评价对我来说无所吊谓。`, options: [`不认同`, `中立`, `认同`] },
      { id: 'q7', dim: 'E1', text: `对象超过5小时没回消息，说自己窜稀了，你会怎么想？`, options: [`拉稀不可能5小时，也许ta隐瞒了我。`, `在信任和怀疑之间摇摆。`, `也许今天ta真的不太舒服。`] },
      { id: 'q8', dim: 'E1', text: `我在感情里经常担心被对方抛弃`, options: [`是的`, `偶尔`, `不是`] },
      { id: 'q9', dim: 'E2', text: `我对天发誓，我对待每一份感情都是认真的！`, options: [`并没有`, `也许？`, `是的！（问心无愧骄傲脸）`] },
      { id: 'q10', dim: 'E2', text: `你的恋爱对象是一个尊老爱幼，温柔敦厚，洁身自好，光明磊落，大义凛然，能言善辩，口才流利，观察入微，见多识广，博学多才，诲人不倦，和蔼可亲，平易近人，心地善良，慈眉善目，积极进取，意气风发，玉树临风，国色天香，倾国倾城，花容月貌的人，此时你会？`, options: [`就算ta再优秀我也不会陷入太深。`, `会介于A和C之间。`, `会非常珍惜ta，也许会变成恋爱脑。`] },
      { id: 'q11', dim: 'E3', text: `恋爱后，对象非常黏人，你作何感想？`, options: [`那很爽了`, `都行无所谓`, `我更喜欢保留独立空间`] },
      { id: 'q12', dim: 'E3', text: `我在任何关系里都很重视个人空间`, options: [`我更喜欢依赖与被依赖`, `看情况`, `是的！（斩钉截铁地说道）`] },
      { id: 'q13', dim: 'A1', text: `大多数人是善良的`, options: [`其实邪恶的人心比世界上的痔疮更多。`, `也许吧。`, `是的，我愿相信好人更多。`] },
      { id: 'q14', dim: 'A1', text: `你走在街上，一位萌萌的小女孩蹦蹦跳跳地朝你走来（正脸、侧脸看都萌，用vivo、苹果、华为、OPPO手机看都萌，实在是非常萌的那种），她递给你一根棒棒糖，此时你作何感想？`, options: [`呜呜她真好真可爱！居然给我棒棒糖！`, `一脸懵逼，作挠头状`, `这也许是一种新型诈骗？还是走开为好。`] },
      { id: 'q15', dim: 'A2', text: `快考试了，学校规定必须上晚自习，请假会扣分，但今晚你约了女/男神一起玩《绝地求生：刺激战场》（一款刺激的游戏），你怎么办？`, options: [`翘了！反正就一次！`, `干脆请个假吧。`, `都快考试了还去啥。`] },
      { id: 'q16', dim: 'A2', text: `我喜欢打破常规，不喜欢被束缚`, options: [`认同`, `保持中立`, `不认同`] },
      { id: 'q17', dim: 'A3', text: `我做事通常有目标。`, options: [`不认同`, `中立`, `认同`] },
      { id: 'q18', dim: 'A3', text: `突然某一天，我意识到人生哪有什么他妈的狗屁意义，人不过是和动物一样被各种欲望支配着，纯纯是被激素控制的东西，饿了就吃，困了就睡，一发情就想交配，我们简直和猪狗一样没什么区别。`, options: [`是这样的。`, `也许是，也许不是。`, `这简直是胡扯`] },
      { id: 'q19', dim: 'Ac1', text: `我做事主要为了取得成果和进步，而不是避免麻烦和风险。`, options: [`不认同`, `中立`, `认同`] },
      { id: 'q20', dim: 'Ac1', text: `你因便秘坐在马桶上（已长达30分钟），拉不出很难受。此时你更像`, options: [`再坐三十分钟看看，说不定就有了。`, `用力拍打自己的屁股并说：死屁股，快拉啊！`, `使用开塞露，快点拉出来才好。`] },
      { id: 'q21', dim: 'Ac2', text: `我做决定比较果断，不喜欢犹豫`, options: [`不认同`, `中立`, `认同`] },
      { id: 'q22', dim: 'Ac2', text: `此题没有题目，请盲选`, options: [`反复思考后感觉应该选A？`, `啊，要不选B？`, `不会就选C？`] },
      { id: 'q23', dim: 'Ac3', text: `别人说你"执行力强"，你内心更接近哪句？`, options: [`我被逼到最后确实执行力超强。。。`, `啊，有时候吧。`, `是的，事情本来就该被推进`] },
      { id: 'q24', dim: 'Ac3', text: `我做事常常有计划，____`, options: [`然而计划不如变化快。`, `有时能完成，有时不能。`, `我讨厌被打破计划。`] },
      { id: 'q25', dim: 'So1', text: `你因玩《第五人格》（一款刺激的游戏）而结识许多网友，并被邀请线下见面，你的想法是？`, options: [`网上口嗨下就算了，真见面还是有点忐忑。`, `见网友也挺好，反正谁来聊我就聊两句。`, `我会打扮一番并热情聊天，万一呢，我是说万一呢？`] },
      { id: 'q26', dim: 'So1', text: `朋友带了ta的朋友一起来玩，你最可能的状态是`, options: [`对"朋友的朋友"天然有点距离感，怕影响二人关系`, `看对方，能玩就玩。`, `朋友的朋友应该也算我的朋友！要热情聊天`] },
      { id: 'q27', dim: 'So2', text: `我和人相处主打一个电子围栏，靠太近会自动报警。`, options: [`认同`, `中立`, `不认同`] },
      { id: 'q28', dim: 'So2', text: `我渴望和我信任的人关系密切，熟得像失散多年的亲戚。`, options: [`认同`, `中立`, `不认同`] },
      { id: 'q29', dim: 'So3', text: `有时候你明明对一件事有不同的、负面的看法，但最后没说出来。多数情况下原因是：`, options: [`这种情况较少。`, `可能碍于情面或者关系。`, `不想让别人知道自己是个阴暗的人。`] },
      { id: 'q30', dim: 'So3', text: `我在不同人面前会表现出不一样的自己`, options: [`不认同`, `中立`, `认同`] }
    ];

    const TYPE_LIBRARY = {
      CTRL: { code: `CTRL`, cn: `拿捏者`, intro: `怎么样，被我拿捏了吧？`, desc: `恭喜您，您测出了全中国最为罕见的人格，您是宇宙熵增定律的天然反抗者！全世界所谓成功人士里，99.99%都是您的拙劣模仿者。CTRL人格，是行走的人形自走任务管理器，普通人眼中的规则，在您这里只是出厂的基础参数设置；凡人所谓的计划，对您而言不过是心血来潮的随手涂鸦。拥有一个CTRL朋友意味着什么？意味着你的人生导航系统会变得更加精准、高效。因为CTRL最会拿捏了。CTRL会在你人生列车即将脱轨的前一秒，用一个Ctrl+S帮你硬核存档，再用一套无法拒绝的逻辑把你强行拽回正轨。他们是你混乱生活最后的备份盘，是宇宙崩塌前唯一还亮着的那个重启键。` },
      ATMer: { code: `ATM-er`, cn: `送钱者`, intro: `你以为我很有钱吗？`, desc: `恭喜您，您竟然测出了这个世界上最稀有的人格。您或将成为金融界的未解之谜——是的，ATM-er不一定真的送钱，但可能永远在支付。支付时间、支付精力、支付耐心、支付一个本该安宁的夜晚。因此像一部老旧但坚固的ATM机，插进去的是别人的焦虑和麻烦，吐出来的是没事，有我的安心保证。您的人生就是一场盛大的、无人喝彩的单人付账秀。您竟用磐石般的可靠，承受了瀑布般的索取，偶尔夜深人静才会对着账单——可能是精神上的——发出一声叹息：我这该死的、无处安放的责任心啊。` },
      Diors: { code: `Dior-s`, cn: `屌丝`, intro: `等着我屌丝逆袭。`, desc: `恭喜！您并非屌丝，您是犬儒主义先贤第欧根尼失散多年的精神传人，因为屌丝的全称是 Diogenes' Original Realist - sage。Dior-s人格，是对当代消费主义陷阱和成功学PUA最彻底的蔑视。他们不是不求上进，而是早已看穿一切上进的上进，而是早已看穿一切上进` },
      BOSS: { code: `BOSS`, cn: `领导者`, intro: `方向盘给我，我来开。`, desc: `BOSS是一个手里永远拿着方向盘的人。哪怕油箱已经亮了红灯，哪怕导航在胡说八道，你都会面无表情地说一句：我来开。然后真的把车开到了目的地。该人格拥有独立的物理法则——永恒向上定律。BOSS人格看世界，就像玩通关了的玩家在看新手教程。效率是他们的信仰，秩序是他们的呼吸。他们不是自带领袖气场，他们本身就是人形的气场发生器，方圆五米内，空气都会自动变得严肃而高效。他们眼中的自我突破，约等于普通人眼中的自虐。今天掌握一门新语言，明天考下一个专业证书，后天就计划殖民火星。你说这太卷了，他会用一种看弱鸡的眼神看着你：不是我太狠，是你太松。` },
      THANK: { code: `THAN-K`, cn: `感恩者`, intro: `我感谢苍天！我感谢大地！`, desc: `恭喜您，您测出了全中国最为罕见的人格。您应当感谢我！感谢您在此刻拥有了生命的滋润！倘若您上班路上堵车了？您也应当说一句：我感谢这次堵车，它让我有更多时间聆听这首美妙的歌曲，并欣赏窗外每一张因焦虑而扭曲的脸庞，让我更珍惜内心的平静。是的，THAN-K拥有温润如玉的性格和海纳百川的胸怀。他们眼中的世界没有完全的坏人，只有尚未被感恩光芒照耀到的朋友。拥有一个THAN-K朋友，就像身边多了一个永不枯竭的正能量发射塔。TA甚至能帮你从墙角的霉斑里发现一幅梵高风格的星空图。` }
    };

    const DIMENSION_EXPLANATIONS = {
      S1: { L: `对自己下手比别人还狠，夸你两句你都想先验明真伪。`, M: `自信值随天气波动，顺风能飞，逆风先缩。`, H: `心里对自己大致有数，不太会被路人一句话打散。` },
      E1: { L: `感情里警报器灵敏，已读不回都能脑补到大结局。`, M: `一半信任，一半试探，感情里常在心里拉锯。`, H: `更愿意相信关系本身，不会被一点风吹草动吓散。` },
      A1: { L: `看世界自带防御滤镜，先怀疑，再靠近。`, M: `既不天真也不彻底阴谋论，观望是你的本能。`, H: `更愿意相信人性和善意，遇事不急着把世界判死刑。` }
    };

    // 状态管理
    let currentQuestionIndex = 0;
    let answers = {};
    let shuffledQuestions = [];

    // 工具函数
    function shuffle(array) {
      const arr = [...array];
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function showScreen(screenId) {
      document.querySelectorAll('.screen').forEach(screen => {
        screen.classList.remove('active');
      });
      document.getElementById(screenId).classList.add('active');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // 开始测试
    function startQuiz() {
      shuffledQuestions = shuffle(QUESTIONS);
      currentQuestionIndex = 0;
      answers = {};
      renderCards();
      updateProgressIndicator();
      showScreen('quiz-screen');
    }

    // 渲染卡片
    function renderCards() {
      const container = document.getElementById('card-container');
      container.innerHTML = '';

      for (let i = 0; i < shuffledQuestions.length; i++) {
        const question = shuffledQuestions[i];
        const card = document.createElement('div');
        card.className = 'question-card';
        card.id = `card-${i}`;

        let positionClass = '';
        if (i < currentQuestionIndex) {
          positionClass = 'prev';
        } else if (i === currentQuestionIndex) {
          positionClass = 'active';
        } else if (i === currentQuestionIndex + 1) {
          positionClass = 'next';
        } else if (i === currentQuestionIndex + 2) {
          positionClass = 'next-next';
        }

        if (positionClass) {
          card.classList.add(positionClass);
        }

        const optionLetters = ['A', 'B', 'C'];

        card.innerHTML = `
          <div class="question-number">题号 ${i + 1} / ${shuffledQuestions.length}</div>
          <div class="question-text">${question.text}</div>
          <div class="options-grid">
            ${question.options.map((option, optIndex) => {
              const isSelected = answers[question.id] === optIndex + 1;
              return `
                <div class="option-card ${isSelected ? 'selected' : ''}" onclick="selectOption(${i}, ${optIndex})">
                  <div class="option-badge">${optionLetters[optIndex]}</div>
                  <div class="option-text">${option}</div>
                </div>
              `;
            }).join('')}
          </div>
          <div class="card-nav">
            <button class="cyber-btn cyber-btn-secondary" onclick="prevQuestion()" ${currentQuestionIndex === 0 ? 'disabled' : ''}>上一题</button>
            <button class="cyber-btn" onclick="nextQuestion()" ${!answers[question.id] ? 'disabled' : ''}>${currentQuestionIndex === shuffledQuestions.length - 1 ? '查看结果' : '下一题'}</button>
          </div>
        `;

        container.appendChild(card);
      }
    }

    // 选择选项
    function selectOption(questionIndex, optionIndex) {
      const question = shuffledQuestions[questionIndex];
      answers[question.id] = optionIndex + 1;

      // 更新UI
      const card = document.getElementById(`card-${questionIndex}`);
      card.querySelectorAll('.option-card').forEach((opt, idx) => {
        opt.classList.toggle('selected', idx === optionIndex);
      });

      // 更新按钮状态
      const nextBtn = card.querySelector('.card-nav .cyber-btn:last-child');
      nextBtn.disabled = false;

      // 自动延迟跳转
      setTimeout(() => {
        if (questionIndex < shuffledQuestions.length - 1) {
          nextQuestion();
        }
      }, 400);
    }

    // 下一题
    function nextQuestion() {
      if (currentQuestionIndex < shuffledQuestions.length - 1) {
        currentQuestionIndex++;
        updateCardPositions();
        updateProgressIndicator();
      } else {
        showResult();
      }
    }

    // 上一题
    function prevQuestion() {
      if (currentQuestionIndex > 0) {
        currentQuestionIndex--;
        updateCardPositions();
        updateProgressIndicator();
      }
    }

    // 更新卡片位置
    function updateCardPositions() {
      for (let i = 0; i < shuffledQuestions.length; i++) {
        const card = document.getElementById(`card-${i}`);
        if (!card) continue;

        card.classList.remove('prev', 'active', 'next', 'next-next');

        if (i < currentQuestionIndex) {
          card.classList.add('prev');
        } else if (i === currentQuestionIndex) {
          card.classList.add('active');
        } else if (i === currentQuestionIndex + 1) {
          card.classList.add('next');
        } else if (i === currentQuestionIndex + 2) {
          card.classList.add('next-next');
        }
      }
    }

    // 更新进度指示器
    function updateProgressIndicator() {
      const indicator = document.getElementById('progress-indicator');
      indicator.innerHTML = shuffledQuestions.map((_, i) => {
        let className = 'progress-dot';
        if (i < currentQuestionIndex) {
          className += ' completed';
        } else if (i === currentQuestionIndex) {
          className += ' active';
        }
        return `<div class="${className}"></div>`;
      }).join('');
    }

    // 计算结果（简化版）
    function calculateResult() {
      const scores = {};
      shuffledQuestions.forEach(q => {
        if (!scores[q.dim]) scores[q.dim] = 0;
        scores[q.dim] += answers[q.id] || 0;
      });

      // 简化匹配：根据分数总和匹配
      const totalScore = Object.values(scores).reduce((a, b) => a + b, 0);
      const avgScore = totalScore / Object.keys(scores).length;

      if (avgScore >= 2.5) return 'BOSS';
      if (avgScore >= 2.0) return 'CTRL';
      if (avgScore >= 1.5) return 'THANK';
      return 'Diors';
    }

    // 显示结果
    function showResult() {
      const resultType = calculateResult();
      const typeInfo = TYPE_LIBRARY[resultType] || TYPE_LIBRARY.CTRL;

      document.getElementById('result-type').textContent = typeInfo.code;
      document.getElementById('result-name').textContent = typeInfo.cn;
      document.getElementById('result-badge').textContent = `匹配度 ${Math.floor(Math.random() * 20) + 80}%`;
      document.getElementById('result-desc').textContent = typeInfo.desc;

      // 设置图片
      const imageElement = document.getElementById('result-image');
      const imagePath = `./images/${typeInfo.code}.png`;
      imageElement.src = imagePath;
      imageElement.onerror = function() {
        this.src = `./images/${typeInfo.code}.jpg`;
      };

      // 渲染维度
      const dimensionGrid = document.getElementById('dimension-grid');
      dimensionGrid.innerHTML = Object.entries(DIMENSION_EXPLANATIONS).map(([dim, levels]) => {
        const levelKey = Object.keys(levels)[Math.floor(Math.random() * 3)];
        return `
          <div class="dimension-card">
            <div class="dimension-header">
              <div class="dimension-name">${dim}</div>
              <div class="dimension-score">${levelKey}</div>
            </div>
            <div class="dimension-desc">${levels[levelKey]}</div>
          </div>
        `;
      }).join('');

      showScreen('result-screen');
    }

    // 重新测试
    function restartQuiz() {
      startQuiz();
    }

    // 返回首页
    function backToIntro() {
      showScreen('intro-screen');
    }
  </script>
</body>
</html>
